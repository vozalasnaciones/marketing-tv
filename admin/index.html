<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Marketing TV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

<div class="container-fluid px-4">

<a class="navbar-brand fw-bold">

<i class="bi bi-tv-fill text-primary"></i>

Marketing TV

</a>

<button class="btn btn-primary">

<i class="bi bi-arrow-clockwise"></i>

Actualizar

</button>

</div>

</nav>

<div class="container py-4">

<div class="row g-3">

<div class="col-md-3">

<div class="card stats">

<div class="card-body">

<i class="bi bi-camera-reels-fill text-primary fs-2"></i>

<h3 id="videos">0</h3>

<p>Videos</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card stats">

<div class="card-body">

<i class="bi bi-image-fill text-success fs-2"></i>

<h3 id="images">0</h3>

<p>Imágenes</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card stats">

<div class="card-body">

<i class="bi bi-hdd-fill text-warning fs-2"></i>

<h3 id="space">0 MB</h3>

<p>Espacio</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card stats">

<div class="card-body">

<i class="bi bi-display-fill text-danger fs-2"></i>

<h3>8</h3>

<p>Pantallas</p>

</div>

</div>

</div>

</div>

<div class="card mt-4">

<div class="card-body">

<div class="d-flex justify-content-between mb-3">

<input
type="text"
class="form-control me-3"
placeholder="Buscar contenido...">

<button class="btn btn-success">

<i class="bi bi-upload"></i>

Subir Archivo

</button>

</div>

<div id="fileList"></div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
