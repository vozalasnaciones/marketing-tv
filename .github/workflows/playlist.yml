name: Generar Playlist

on:
  push:
    paths:
      - 'media/**'

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Generar playlist.json
        run: |

          echo "[" > playlist.json

          first=true

          for file in $(find media -type f | sort); do

            ext="${file##*.}"

            if [[ "$ext" =~ ^(jpg|jpeg|png|webp|gif)$ ]]; then

              type="image"

            elif [[ "$ext" =~ ^(mp4|webm|mov)$ ]]; then

              type="video"

            else

              continue

            fi

            if [ "$first" = false ]; then
              echo "," >> playlist.json
            fi

            first=false

            echo "  {\"type\":\"$type\",\"file\":\"$file\",\"duration\":10}" >> playlist.json

          done

          echo "]" >> playlist.json

      - name: Commit playlist
        run: |

          git config user.name "github-actions"

          git config user.email "actions@github.com"

          git add playlist.json

          git diff --cached --quiet || git commit -m "Actualizar playlist"

          git push
